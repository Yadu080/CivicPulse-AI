# Cloud Build pipeline: build image -> push to Artifact Registry -> deploy to Cloud Run.
# Trigger manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=civicpulse-ai
#
# Substitutions have sensible defaults so a bare `gcloud builds submit` also works.
substitutions:
  _REGION: us-central1
  _SERVICE: civicpulse-ai
  _MODEL: gemini-2.5-flash-lite

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

steps:
  # 1. Build the container image.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"
      - .

  # 2. Push the image to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA"

  # 3. Deploy to Cloud Run (Vertex AI backend via the service account).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_SERVICE}"
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/${_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --port=8080
      - --set-env-vars=GEMINI_MODEL=${_MODEL},GOOGLE_GENAI_USE_VERTEXAI=true,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}

options:
  logging: CLOUD_LOGGING_ONLY
